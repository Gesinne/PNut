# /etc/nftables.d/sai.conf  (incluir desde /etc/nftables.conf)
# Limita el acceso al puente (49152) a la subred local. Ajusta el rango.
# UDP 1900: SSDP autodescubrimiento (multicast LAN, no expuesto fuera).
table inet sai {
    chain input {
        type filter hook input priority 0; policy accept;
        tcp dport 49152 ip saddr != 192.168.178.0/24 drop
        tcp dport 3493  ip saddr != 127.0.0.1       drop
        udp dport 1900  ip saddr != 192.168.178.0/24 drop
    }
}
