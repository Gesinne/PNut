# /etc/nut/ups.conf — un bloque [seccion] por SAI conectado a esta Pi.
# 'driver' lo determina 'nut-scanner -U'. SAIs económicos: nutdrv_qx.
# SAIs de marca con HID: usbhid-ups.

maxretry = 3
pollinterval = 2          # el driver consulta el hardware cada 2 s

[sai1]
    driver = usbhid-ups
    port = auto
    desc = "SAI principal"

